version: '3.9'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 settings.asgi:application
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - sqlite_volume:/app/db.sqlite3
    expose:
      - "8000"
    env_file:
      - settings/.env
    environment:
      - DJANGO_SETTINGS_MODULE=settings.env.prod
      - SHAKS_ENV_ID=prod
    depends_on:
      - redis
    restart: unless-stopped

  celery_worker:
    build: .
    command: celery -A settings worker -l info -c 4
    volumes:
      - .:/app
    env_file:
      - settings/.env
    environment:
      - DJANGO_SETTINGS_MODULE=settings.env.prod
      - SHAKS_ENV_ID=prod
    depends_on:
      - redis
    restart: unless-stopped

  celery_beat:
    build: .
    command: celery -A settings beat -l info
    volumes:
      - .:/app
    env_file:
      - settings/.env
    environment:
      - DJANGO_SETTINGS_MODULE=settings.env.prod
      - SHAKS_ENV_ID=prod
    depends_on:
      - redis
    restart: unless-stopped

  flower:
    build: .
    command: >
      celery -A settings flower
      --basic_auth=${SHAKS_FLOWER_USER:-admin}:${SHAKS_FLOWER_PASSWORD:-changeme}
    ports:
      - "5555:5555"
    env_file:
      - settings/.env
    environment:
      - DJANGO_SETTINGS_MODULE=settings.env.prod
      - SHAKS_ENV_ID=prod
    depends_on:
      - redis
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  static_volume:
  media_volume:
  sqlite_volume:
